    **Как правильно реализовать синглтон с использованием метакласса?**
    ```python
    class SingletonMeta(type):
        _instances = {}
        def __call__(cls, *args, **kwargs):
            if cls not in cls._instances:
                cls._instances[cls] = super().__call__(*args, **kwargs)
            return cls._instances[cls]

    class MyClass(metaclass=SingletonMeta):
        pass
    ```
    1) Гарантирует создание только одного экземпляра `MyClass`
    2) Создаёт новый экземпляр при каждом вызове
    3) Вызывает ошибку из‑за циклической ссылки
    4) Требует явного вызова `__new__`
    5) Работает только для неизменяемых объектов
