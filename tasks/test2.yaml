  text: |
    **Что произойдёт при использовании `weakref` на объект с циклическими ссылками?**
    ```python
    import weakref

    class Node:
        def __init__(self, value):
            self.value = value
            self.parent = None
            self.children = []

    root = Node('root')
    child = Node('child')
    root.children.append(child)
    child.parent = root

    ref = weakref.ref(root)
    del root
    print(ref() is None)
    ```
