- id: tid200
  difficulty: 5
  p: 0.9
  alpha: 9
  beta: 1
  text: |
    **Какой результат даст использование `sys.settrace` для отладки рекурсивной функции?**
    ```python
    import sys

    calls = 0
    def tracer(frame, event, arg):
        nonlocal calls
        if event == 'call':
            calls += 1
        return tracer

    def recurse(n):
        if n <= 0:
            return
        recurse(n - 1)

    sys.settrace(tracer)
    recurse(3)
    sys.settrace(None)
    print(calls)
    ```
    1) `4` — учитывает все вызовы: `recurse(3)`, `recurse(2)`, `recurse(1)`, `recurse(0)`
    2) `3` — считает только рекурсивные вызовы, исключая начальный
    3) `0` — трассировка не работает для рекурсии
    4) `1` — только первый вызов функции
    5) Вызовет `SyntaxError` из‑за использования `nonlocal`
  answer: "1"
